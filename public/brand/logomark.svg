  <rect x="17" y="21" width="62" height="51" rx="16" fill="#070b14" stroke="#3fd8f0" stroke-opacity=".34" stroke-width="1.4"/>
  <path d="M31 49.5l10.5 10.5 24-26.5" fill="none" stroke="url(#checkInk)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#checkGlow)"/>
  <path d="M20 68h56" stroke="#000000" stroke-width="3.5" stroke-linecap="round" opacity=".36"/>
