<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-label="咔哒 Clack 标志">
  <defs>
    <linearGradient id="keyBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f2e4e"/>
      <stop offset=".52" stop-color="#111827"/>
      <stop offset="1" stop-color="#070a12"/>
    </linearGradient>
    <linearGradient id="keyEdge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6fe3f4"/>
      <stop offset=".5" stop-color="#3fd8f0"/>
      <stop offset="1" stop-color="#2f7bff"/>
    </linearGradient>
    <linearGradient id="checkInk" x1="29" y1="60" x2="69" y2="33" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset=".45" stop-color="#6fe3f4"/>
